name: numerical-and-neural-tests

on:
  push:
  pull_request:

jobs:
  numerical:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: pip
      - run: pip install -r requirements-numerical.txt
      - run: MPLBACKEND=Agg python -m unittest discover -s tests -v

  legacy-neural:
    runs-on: ubuntu-latest
    container: tensorflow/tensorflow:1.15.5-py3
    steps:
      - uses: actions/checkout@v4
      - run: pip install Keras==2.2.4 h5py==2.10.0 protobuf==3.20.3
      - run: python -m unittest legacy_tests.neural_smoke -v
